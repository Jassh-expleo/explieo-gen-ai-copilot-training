name: 🔐 Add User to Readers Team

on:
  pull_request:
    branches: [main]
    paths:
      - "readers.txt"
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

jobs:
  add-to-readers-team:
    name: Validate & Auto-Merge
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── 2. Guard: ONLY readers.txt may be changed ──────────────────────────
      - name: Validate – only readers.txt is modified
        id: validate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CHANGED_FILES=$(git diff origin/main...HEAD --name-only)
          echo "Files changed in this PR:"
          echo "$CHANGED_FILES"

          if [ "$CHANGED_FILES" != "readers.txt" ]; then
            gh pr comment ${{ github.event.pull_request.number }} \
              --body "❌ **PR rejected.** Only \`readers.txt\` may be modified. This PR has been closed automatically. Fork the repo, add only your username to \`readers.txt\`, and re-raise the PR."
            gh pr close ${{ github.event.pull_request.number }}
            exit 1
          fi

          # Only one line should be added — no deletions allowed
          LINES_ADDED=$(git diff origin/main...HEAD -- readers.txt | grep '^+[^+]' | wc -l | tr -d ' ')
          LINES_REMOVED=$(git diff origin/main...HEAD -- readers.txt | grep '^-[^-]' | wc -l | tr -d ' ')

          if [ "$LINES_REMOVED" -gt 0 ]; then
            gh pr comment ${{ github.event.pull_request.number }} \
              --body "❌ **PR rejected.** You may only **add** your username — removing existing lines is not allowed."
            gh pr close ${{ github.event.pull_request.number }}
            exit 1
          fi

          if [ "$LINES_ADDED" -ne 1 ]; then
            gh pr comment ${{ github.event.pull_request.number }} \
              --body "❌ **PR rejected.** Please add exactly **one** username per PR."
            gh pr close ${{ github.event.pull_request.number }}
            exit 1
          fi

          # Extract the new username
          NEW_USER=$(git diff origin/main...HEAD -- readers.txt \
            | grep '^+[^+]' \
            | sed 's/^+//' \
            | grep -E '^[a-zA-Z0-9_-]+$' \
            | head -1 \
            | tr -d '[:space:]')

          if [ -z "$NEW_USER" ]; then
            gh pr comment ${{ github.event.pull_request.number }} \
              --body "❌ **PR rejected.** No valid GitHub username found. Add your username as plain text (letters, numbers, hyphens only) on a new line."
            gh pr close ${{ github.event.pull_request.number }}
            exit 1
          fi

          echo "Detected new username: $NEW_USER"
          echo "new_user=$NEW_USER" >> "$GITHUB_OUTPUT"

      # ── 3. Auto-merge the PR ───────────────────────────────────────────────
      - name: Auto-merge PR
        env:
          GH_TOKEN: ${{ secrets.ORG_ADMIN_TOKEN }}
        run: |
          gh pr merge ${{ github.event.pull_request.number }} \
            --squash \
            --admin \
            --subject "chore: add ${{ steps.validate.outputs.new_user }} to readers [skip ci]"

      # ── 4. Success comment ────────────────────────────────────────────────
      - name: Post success comment
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} \
            --body "✅ **Welcome, @${{ steps.validate.outputs.new_user }}!** \
          You are now listed as a Reader. The repository is **public** — you can view and fork it. \
          You **cannot** push, modify, or delete anything in this repo."

